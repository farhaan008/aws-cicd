name: Deploy Vue + Node.js Application

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    # 1. Checkout source code
    - name: Checkout Repository
      uses: actions/checkout@v4


    # 2. Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20


    # ==========================
    # Build Vue Application
    # ==========================

    - name: Install Vue Dependencies
      working-directory: frontend
      run: npm install


    - name: Build Vue Application
      working-directory: frontend
      run: npm run build:dev



    # ==========================
    # Prepare Node.js Backend
    # ==========================

    - name: Install Backend Dependencies
      working-directory: backend
      run: npm install --production



    # ==========================
    # Deploy Vue to EC2
    # ==========================

    - name: Deploy Vue Build to EC2
      uses: appleboy/scp-action@v0.1.7

      with:

        host: ${{ secrets.EC2_HOST }}

        username: ${{ secrets.EC2_USER }}

        key: ${{ secrets.EC2_SSH_KEY }}

        source: "frontend/dist/*"

        target: "/home/ec2-user/frontend"



    # ==========================
    # Deploy Node.js Backend
    # ==========================

    - name: Deploy Node.js Backend
      uses: appleboy/scp-action@v0.1.7

      with:

        host: ${{ secrets.EC2_HOST }}

        username: ${{ secrets.EC2_USER }}

        key: ${{ secrets.EC2_SSH_KEY }}

        source: "backend/*"

        target: "/home/ec2-user/backend"



    # ==========================
    # Restart Application
    # ==========================

    - name: Restart Node.js using PM2
      uses: appleboy/ssh-action@v1.0.3

      with:

        host: ${{ secrets.EC2_HOST }}

        username: ${{ secrets.EC2_USER }}

        key: ${{ secrets.EC2_SSH_KEY }}

        script: |

          cd /home/ec2-user/backend

          npm install --production

          pm2 restart backend || pm2 start server.js --name backend

          pm2 save
